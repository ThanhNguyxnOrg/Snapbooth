<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth - SnapStrip Studio</title>
    <meta name="description" content="Take photos with SnapStrip Studio - Create your photo strip now!">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.ico">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        #video {
            transform: scaleX(-1); /* Mirror effect for selfie */
        }
        
        .countdown {
            font-size: 150px;
            font-weight: bold;
            color: #FF6B9D;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        .flash {
            animation: flash 0.3s ease-in-out;
        }
        
        .photo-frame {
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .filter-btn {
            transition: all 0.3s ease;
        }
        
        .filter-btn:hover {
            transform: scale(1.1);
        }
        
        .filter-btn.active {
            border: 3px solid #C147E9;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="font-sans overflow-y-auto">
    
    <!-- Main Container -->
    <div class="min-h-screen flex flex-col p-4">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-4">
            <a href="index.html" class="text-white font-bold text-xl flex items-center gap-2 hover:opacity-80 transition">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span>Back to Home</span>
            </a>
            
            <div class="text-white text-right">
                <p class="font-bold" id="layout-info">Layout A - 4 Poses</p>
                <p class="text-sm" id="photo-count"><span>Photo</span> 0/4</p>
            </div>
        </div>
        
        <!-- Source Selection (Camera or Upload) -->
        <div id="source-selection" class="glass-effect rounded-3xl p-8 text-center mb-4">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Choose Photo Source</h2>
            <p class="text-gray-600 mb-8">How would you like to add your photos?</p>
            <div class="flex gap-4 justify-center flex-wrap">
                <button id="use-camera-btn" class="bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold py-6 px-12 rounded-2xl text-xl shadow-xl hover:shadow-2xl transform hover:scale-105 transition flex flex-col items-center gap-3">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span>Use Camera</span>
                </button>
                <button id="upload-photos-btn" class="bg-gradient-to-r from-pink-500 to-red-600 text-white font-bold py-6 px-12 rounded-2xl text-xl shadow-xl hover:shadow-2xl transform hover:scale-105 transition flex flex-col items-center gap-3">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <span>Upload Photos</span>
                </button>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
        </div>
        
        <!-- Main Content -->
        <div id="photo-booth-container" class="hidden flex-1 flex gap-4">
            
            <!-- Camera Section -->
            <div class="flex-1 glass-effect rounded-3xl p-6 relative flex flex-col">
                
                <!-- Video/Canvas Container -->
                <div class="flex-1 bg-black rounded-2xl overflow-hidden relative">
                    <!-- Video Stream -->
                    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                    
                    <!-- Canvas for capturing -->
                    <canvas id="canvas" class="hidden"></canvas>
                    
                    <!-- Flash Effect -->
                    <div id="flash" class="absolute inset-0 bg-white opacity-0 pointer-events-none"></div>
                    
                    <!-- Countdown Overlay -->
                    <div id="countdown-overlay" class="hidden absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                        <div id="countdown-number" class="countdown"></div>
                    </div>
                    
                    <!-- Filter Preview Overlay -->
                    <div id="filter-overlay" class="absolute inset-0 pointer-events-none"></div>
                </div>
                
                <!-- Filters -->
                <div class="mt-4">
                    <p class="text-gray-700 font-semibold mb-2">Filters:</p>
                    <div class="flex gap-2 overflow-x-auto pb-2">
                        <button class="filter-btn active bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="none">
                            <div class="w-16 h-16 bg-gradient-to-br from-gray-200 to-gray-300 rounded"></div>
                            <p class="text-xs mt-1 text-center">None</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="grayscale">
                            <div class="w-16 h-16 bg-gradient-to-br from-gray-400 to-gray-600 rounded"></div>
                            <p class="text-xs mt-1 text-center">B&W</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="sepia">
                            <div class="w-16 h-16 bg-gradient-to-br from-yellow-600 to-orange-700 rounded"></div>
                            <p class="text-xs mt-1 text-center">Sepia</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="vintage">
                            <div class="w-16 h-16 bg-gradient-to-br from-red-300 to-yellow-300 rounded"></div>
                            <p class="text-xs mt-1 text-center">Vintage</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="cool">
                            <div class="w-16 h-16 bg-gradient-to-br from-blue-300 to-cyan-300 rounded"></div>
                            <p class="text-xs mt-1 text-center">Cool</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="warm">
                            <div class="w-16 h-16 bg-gradient-to-br from-orange-300 to-pink-300 rounded"></div>
                            <p class="text-xs mt-1 text-center">Warm</p>
                        </button>
                    </div>
                </div>
                
                <!-- Capture Button -->
                <div class="mt-4 text-center">
                    <button id="start-btn" class="bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold py-4 px-12 rounded-full text-xl shadow-2xl hover:shadow-3xl transform hover:scale-105 transition">
                        <span>Start Taking Photos</span>
                    </button>
                    <button id="retake-btn" class="hidden bg-gray-600 text-white font-bold py-3 px-8 rounded-full text-lg shadow-xl hover:bg-gray-700 transition ml-2">
                        <span>Retake All</span>
                    </button>
                </div>
            </div>
            
            <!-- Photo Strip Preview -->
            <div class="w-80 glass-effect rounded-3xl p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">Your Photo Strip</h2>
                
                <!-- Photo Strip Container -->
                <div id="photo-strip" class="bg-white p-4 rounded-lg shadow-xl">
                    <div id="strip-photos" class="space-y-2">
                        <!-- Photos will be added here -->
                    </div>
                    
                    <!-- Branding -->
                    <div class="mt-3 pt-3 border-t-2 border-gray-300 text-center">
                        <p class="text-xs font-bold text-gray-600">SnapStrip Studio</p>
                        <p class="text-xs text-gray-400">snapstripstudio.com</p>
                    </div>
                </div>
                
                <!-- Download Button -->
                <button id="download-btn" class="hidden w-full mt-4 bg-gradient-to-r from-green-500 to-teal-600 text-white font-bold py-3 px-6 rounded-full shadow-xl hover:shadow-2xl transform hover:scale-105 transition">
                    <span>📥 Download Photo Strip</span>
                </button>
                
                <!-- Share Button -->
                <button id="share-btn" class="hidden w-full mt-2 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold py-3 px-6 rounded-full shadow-xl hover:shadow-2xl transform hover:scale-105 transition">
                    <span>📤 Share</span>
                </button>
            </div>
            
        </div>
    </div>
    
    <!-- Scripts -->
    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const layout = urlParams.get('layout') || 'A';
        const poses = parseInt(urlParams.get('poses')) || 4;
        const template = urlParams.get('template') || 'classic';
        
        // Debug: Log template selection
        console.log('📸 Camera Page Loaded');
        console.log('Layout:', layout, '| Poses:', poses, '| Template:', template);
        
        // Update layout info
        document.getElementById('layout-info').textContent = `Layout ${layout} - ${poses} Poses - ${template.charAt(0).toUpperCase() + template.slice(1)}`;
        
        // Elements
        const sourceSelection = document.getElementById('source-selection');
        const photoBoothContainer = document.getElementById('photo-booth-container');
        const useCameraBtn = document.getElementById('use-camera-btn');
        const uploadPhotosBtn = document.getElementById('upload-photos-btn');
        const fileInput = document.getElementById('file-input');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const downloadBtn = document.getElementById('download-btn');
        const shareBtn = document.getElementById('share-btn');
        const flash = document.getElementById('flash');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownNumber = document.getElementById('countdown-number');
        const photoCount = document.getElementById('photo-count');
        const stripPhotos = document.getElementById('strip-photos');
        const filterOverlay = document.getElementById('filter-overlay');
        const filterBtns = document.querySelectorAll('.filter-btn');
        
        // State
        let stream = null;
        let capturedPhotos = [];
        let currentFilter = 'none';
        let isCapturing = false;
        let sourceMode = null; // 'camera' or 'upload'
        
        // Source selection handlers
        useCameraBtn.addEventListener('click', () => {
            sourceMode = 'camera';
            sourceSelection.classList.add('hidden');
            photoBoothContainer.classList.remove('hidden');
            initCamera();
            initializePlaceholders();
        });
        
        uploadPhotosBtn.addEventListener('click', () => {
            sourceMode = 'upload';
            fileInput.click();
        });
        
        // File upload handler
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            
            if (files.length === 0) return;
            
            // Check if enough photos
            if (files.length < poses) {
                alert(`Please select at least ${poses} photos for your layout.`);
                return;
            }
            
            // Hide source selection and show photo booth
            sourceSelection.classList.add('hidden');
            photoBoothContainer.classList.remove('hidden');
            initializePlaceholders();
            
            // Process uploaded photos
            capturedPhotos = [];
            for (let i = 0; i < Math.min(poses, files.length); i++) {
                const file = files[i];
                const img = await loadImage(file);
                
                // Draw to canvas with filter
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                applyFilterToCanvas(currentFilter);
                
                // Save photo
                const photoData = canvas.toDataURL('image/jpeg', 0.9);
                capturedPhotos.push(photoData);
                
                // Update preview
                const photoElement = document.getElementById(`photo-${i}`);
                photoElement.innerHTML = `<img src="${photoData}" class="w-full h-full object-cover rounded-lg">`;
                photoCount.textContent = `Photo ${i + 1}/${poses}`;
            }
            
            // Show download/share buttons
            startBtn.classList.add('hidden');
            retakeBtn.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
            if (navigator.share) {
                shareBtn.classList.remove('hidden');
            }
        });
        
        // Helper function to load image from file
        function loadImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // Initialize placeholders based on layout
        function initializePlaceholders() {
            stripPhotos.innerHTML = '';
            for (let i = 0; i < poses; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'photo-frame aspect-square bg-gradient-to-br from-gray-100 to-gray-200 rounded-lg flex items-center justify-center';
                placeholder.innerHTML = `<span class="text-gray-400 text-4xl">${i + 1}</span>`;
                placeholder.id = `photo-${i}`;
                stripPhotos.appendChild(placeholder);
            }
        }
        
        // Initialize camera
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    },
                    audio: false 
                });
                video.srcObject = stream;
                
                // Set canvas size when video is loaded
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
            } catch (error) {
                alert('Could not access camera. Please ensure camera permissions are granted.\n\nError: ' + error.message);
                console.error('Camera error:', error);
            }
        }
        
        // Apply filter
        function applyFilter(filter) {
            const filters = {
                'none': 'none',
                'grayscale': 'grayscale(100%)',
                'sepia': 'sepia(100%)',
                'vintage': 'sepia(50%) contrast(120%) brightness(90%)',
                'cool': 'hue-rotate(180deg) saturate(150%)',
                'warm': 'sepia(30%) saturate(150%) brightness(110%)'
            };
            
            video.style.filter = filters[filter] || 'none';
            currentFilter = filter;
        }
        
        // Apply filter to canvas (for uploaded images or captured photos)
        function applyFilterToCanvas(filter) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            switch(filter) {
                case 'grayscale':
                    for (let i = 0; i < data.length; i += 4) {
                        const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                        data[i] = data[i + 1] = data[i + 2] = gray;
                    }
                    break;
                case 'sepia':
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i + 1], b = data[i + 2];
                        data[i] = Math.min(255, r * 0.393 + g * 0.769 + b * 0.189);
                        data[i + 1] = Math.min(255, r * 0.349 + g * 0.686 + b * 0.168);
                        data[i + 2] = Math.min(255, r * 0.272 + g * 0.534 + b * 0.131);
                    }
                    break;
                case 'vintage':
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i + 1], b = data[i + 2];
                        data[i] = Math.min(255, (r * 0.393 + g * 0.769 + b * 0.189) * 1.1);
                        data[i + 1] = Math.min(255, (r * 0.349 + g * 0.686 + b * 0.168) * 0.9);
                        data[i + 2] = Math.min(255, (r * 0.272 + g * 0.534 + b * 0.131) * 0.8);
                    }
                    break;
                case 'cool':
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = Math.min(255, data[i] * 0.7);
                        data[i + 1] = Math.min(255, data[i + 1] * 1.2);
                        data[i + 2] = Math.min(255, data[i + 2] * 1.3);
                    }
                    break;
                case 'warm':
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = Math.min(255, data[i] * 1.2);
                        data[i + 1] = Math.min(255, data[i + 1] * 1.1);
                        data[i + 2] = Math.min(255, data[i + 2] * 0.8);
                    }
                    break;
            }
            
            ctx.putImageData(imageData, 0, 0);
        }
        
        // Filter buttons
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                applyFilter(filter);
            });
        });
        
        // Countdown
        async function countdown() {
            countdownOverlay.classList.remove('hidden');
            for (let i = 3; i > 0; i--) {
                countdownNumber.textContent = i;
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            countdownNumber.textContent = '📸';
            await new Promise(resolve => setTimeout(resolve, 300));
            countdownOverlay.classList.add('hidden');
        }
        
        // Capture photo
        function capturePhoto() {
            // Flash effect
            flash.classList.add('flash');
            setTimeout(() => flash.classList.remove('flash'), 300);
            
            // Draw current frame to canvas (mirrored for selfie mode)
            ctx.save();
            ctx.scale(-1, 1); // Mirror
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
            
            // Apply filter to canvas
            applyFilterToCanvas(currentFilter);
            
            // Create a new canvas with template effects
            const templateCanvas = document.createElement('canvas');
            const templateCtx = templateCanvas.getContext('2d');
            
            // Set canvas size with padding for template effects
            const padding = 20;
            templateCanvas.width = canvas.width + (padding * 2);
            templateCanvas.height = canvas.height + (padding * 2);
            
            // Draw template background/border
            drawPhotoTemplateFrame(templateCtx, 0, 0, templateCanvas.width, templateCanvas.height, capturedPhotos.length);
            
            // Draw the photo in the center
            templateCtx.drawImage(canvas, padding, padding, canvas.width, canvas.height);
            
            // Get image data with template
            const imageData = templateCanvas.toDataURL('image/jpeg', 0.9);
            capturedPhotos.push(imageData);
            
            // Update UI
            const photoIndex = capturedPhotos.length - 1;
            const photoElement = document.getElementById(`photo-${photoIndex}`);
            if (photoElement) {
                photoElement.innerHTML = `<img src="${imageData}" class="w-full h-full object-cover rounded-lg">`;
            }
            
            // Update counter
            photoCount.textContent = `Photo ${capturedPhotos.length}/${poses}`;
            
            return imageData;
        }
        
        // Start photo session
        async function startPhotoSession() {
            if (isCapturing) return;
            isCapturing = true;
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50');
            
            capturedPhotos = [];
            initializePlaceholders();
            
            for (let i = 0; i < poses; i++) {
                await countdown();
                capturePhoto();
                
                // Wait before next photo (except for last one)
                if (i < poses - 1) {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                }
            }
            
            // Session complete
            isCapturing = false;
            startBtn.classList.remove('opacity-50');
            startBtn.disabled = false;
            downloadBtn.classList.remove('hidden');
            shareBtn.classList.remove('hidden');
            retakeBtn.classList.remove('hidden');
            
            alert('🎉 Photos captured! You can now download your photo strip or retake.');
        }
        
        // Download photo strip
        function downloadPhotoStrip() {
            const stripElement = document.getElementById('photo-strip');
            
            // Use html2canvas if available, otherwise create a simple canvas
            const stripCanvas = document.createElement('canvas');
            const stripCtx = stripCanvas.getContext('2d');
            
            // Calculate dimensions
            const photoWidth = 400;
            const photoHeight = 400;
            const padding = 40;
            const brandingHeight = 80;
            
            stripCanvas.width = photoWidth + (padding * 2);
            stripCanvas.height = (photoHeight * poses) + (padding * 2) + brandingHeight;
            
            // Draw template background first
            drawTemplateBackground(stripCtx, stripCanvas.width, stripCanvas.height);
            
            // Draw photos with template styling
            const promises = capturedPhotos.map((photoData, index) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const y = padding + (index * photoHeight);
                        drawPhotoWithTemplate(stripCtx, img, padding, y, photoWidth, photoHeight, index);
                        resolve();
                    };
                    img.src = photoData;
                });
            });
            
            Promise.all(promises).then(() => {
                // Add template-specific branding
                drawTemplateBranding(stripCtx, stripCanvas.width, stripCanvas.height, brandingHeight);
                
                // Download
                const link = document.createElement('a');
                link.download = `snapstrip-${template}-${Date.now()}.jpg`;
                link.href = stripCanvas.toDataURL('image/jpeg', 0.95);
                link.click();
            });
        }
        
        // Template rendering functions
        // Draw template frame for individual photo (used in preview)
        function drawPhotoTemplateFrame(ctx, x, y, width, height, index) {
            switch(template) {
                case 'newspaper':
                    ctx.fillStyle = '#FEF3C7';
                    ctx.fillRect(x, y, width, height);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x + 5, y + 5, width - 10, height - 10);
                    break;
                case 'magazine':
                    ctx.fillStyle = '#FDF2F8';
                    ctx.fillRect(x, y, width, height);
                    ctx.strokeStyle = '#EC4899';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x + 8, y + 8, width - 16, height - 16);
                    break;
                case 'comic':
                    ctx.fillStyle = '#FEF08A';
                    ctx.fillRect(x, y, width, height);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 5;
                    ctx.strokeRect(x + 6, y + 6, width - 12, height - 12);
                    break;
                case 'polaroid':
                    ctx.fillStyle = '#FFF';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(x, y, width, height);
                    ctx.shadowColor = 'transparent';
                    break;
                case 'passport':
                    const passGrad = ctx.createLinearGradient(x, y, x + width, y);
                    passGrad.addColorStop(0, '#1E3A8A');
                    passGrad.addColorStop(1, '#991B1B');
                    ctx.fillStyle = passGrad;
                    ctx.fillRect(x, y, width, height);
                    ctx.strokeStyle = '#FCD34D';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x + 6, y + 6, width - 12, height - 12);
                    break;
                case 'movie':
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x, y, width, height);
                    ctx.strokeStyle = '#FCD34D';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x + 8, y + 8, width - 16, height - 16);
                    break;
                case 'vintage':
                    ctx.fillStyle = '#FEF3C7';
                    ctx.fillRect(x, y, width, height);
                    ctx.strokeStyle = '#92400E';
                    ctx.lineWidth = 8;
                    ctx.strokeRect(x + 8, y + 8, width - 16, height - 16);
                    break;
                case 'neon':
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x, y, width, height);
                    ctx.shadowColor = index % 2 === 0 ? '#EC4899' : '#06B6D4';
                    ctx.shadowBlur = 15;
                    ctx.strokeStyle = ctx.shadowColor;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 10, y + 10, width - 20, height - 20);
                    ctx.shadowColor = 'transparent';
                    break;
                case 'scrapbook':
                    const scrapGrad = ctx.createLinearGradient(x, y, x + width, y + height);
                    scrapGrad.addColorStop(0, '#FEF3F2');
                    scrapGrad.addColorStop(1, '#EFF6FF');
                    ctx.fillStyle = scrapGrad;
                    ctx.fillRect(x, y, width, height);
                    ctx.save();
                    ctx.setLineDash([8, 4]);
                    ctx.strokeStyle = ['#EC4899', '#06B6D4', '#FACC15'][index % 3];
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x + 8, y + 8, width - 16, height - 16);
                    ctx.setLineDash([]);
                    ctx.restore();
                    break;
                case 'minimalist':
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(x, y, width, height);
                    ctx.strokeStyle = '#D1D5DB';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 12, y + 12, width - 24, height - 24);
                    break;
                case 'instagram':
                    const instaGrad = ctx.createLinearGradient(x, y, x + width, y + height);
                    instaGrad.addColorStop(0, '#A855F7');
                    instaGrad.addColorStop(0.5, '#EC4899');
                    instaGrad.addColorStop(1, '#FACC15');
                    ctx.fillStyle = instaGrad;
                    ctx.fillRect(x, y, width, height);
                    break;
                case 'classic':
                default:
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x, y, width, height);
                    ctx.strokeStyle = '#E5E7EB';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 5, y + 5, width - 10, height - 10);
            }
        }
        
        function drawTemplateBackground(ctx, width, height) {
            switch(template) {
                case 'newspaper':
                    ctx.fillStyle = '#FEF3C7';
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 8;
                    ctx.strokeRect(10, 10, width - 20, height - 20);
                    break;
                case 'magazine':
                    const magGrad = ctx.createLinearGradient(0, 0, 0, height);
                    magGrad.addColorStop(0, '#FDF2F8');
                    magGrad.addColorStop(1, '#FAE8FF');
                    ctx.fillStyle = magGrad;
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#EC4899';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(20, 20, width - 40, height - 40);
                    break;
                case 'comic':
                    const comicGrad = ctx.createLinearGradient(0, 0, width, height);
                    comicGrad.addColorStop(0, '#FEF08A');
                    comicGrad.addColorStop(1, '#FCA5A5');
                    ctx.fillStyle = comicGrad;
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 10;
                    ctx.strokeRect(15, 15, width - 30, height - 30);
                    break;
                case 'polaroid':
                    ctx.fillStyle = '#F9FAFB';
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'passport':
                    const passGrad = ctx.createLinearGradient(0, 0, width, 0);
                    passGrad.addColorStop(0, '#1E3A8A');
                    passGrad.addColorStop(1, '#991B1B');
                    ctx.fillStyle = passGrad;
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#FCD34D';
                    ctx.lineWidth = 8;
                    ctx.strokeRect(15, 15, width - 30, height - 30);
                    break;
                case 'movie':
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#FCD34D';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(20, 20, width - 40, height - 40);
                    break;
                case 'vintage':
                    ctx.fillStyle = '#FEF3C7';
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#92400E';
                    ctx.lineWidth = 16;
                    ctx.strokeRect(20, 20, width - 40, height - 40);
                    ctx.strokeRect(28, 28, width - 56, height - 56);
                    break;
                case 'neon':
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'scrapbook':
                    const scrapGrad = ctx.createLinearGradient(0, 0, width, height);
                    scrapGrad.addColorStop(0, '#FEF3F2');
                    scrapGrad.addColorStop(0.5, '#EFF6FF');
                    scrapGrad.addColorStop(1, '#FEF3F2');
                    ctx.fillStyle = scrapGrad;
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'minimalist':
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#D1D5DB';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(30, 30, width - 60, height - 60);
                    break;
                case 'instagram':
                    const instaGrad = ctx.createLinearGradient(0, 0, width, height);
                    instaGrad.addColorStop(0, '#A855F7');
                    instaGrad.addColorStop(0.5, '#EC4899');
                    instaGrad.addColorStop(1, '#FACC15');
                    ctx.fillStyle = instaGrad;
                    ctx.fillRect(0, 0, width, height);
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(15, 15, width - 30, height - 30);
                    break;
                default:
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, width, height);
            }
        }
        
        function drawPhotoWithTemplate(ctx, img, x, y, w, h, index) {
            switch(template) {
                case 'newspaper':
                case 'comic':
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x - 3, y - 3, w + 6, h + 6);
                    ctx.drawImage(img, x, y, w, h);
                    break;
                case 'polaroid':
                    ctx.fillStyle = '#FFF';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(x - 12, y - 12, w + 24, h + 40);
                    ctx.shadowColor = 'transparent';
                    ctx.drawImage(img, x, y, w, h);
                    break;
                case 'passport':
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(x - 8, y - 8, w + 16, h + 16);
                    ctx.drawImage(img, x, y, w, h);
                    break;
                case 'neon':
                    ctx.shadowColor = index % 2 === 0 ? '#EC4899' : '#06B6D4';
                    ctx.shadowBlur = 20;
                    ctx.drawImage(img, x, y, w, h);
                    ctx.shadowColor = 'transparent';
                    break;
                case 'scrapbook':
                    ctx.save();
                    ctx.setLineDash([8, 4]);
                    ctx.strokeStyle = ['#EC4899', '#06B6D4', '#FACC15'][index % 3];
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x - 4, y - 4, w + 8, h + 8);
                    ctx.setLineDash([]);
                    ctx.restore();
                    ctx.drawImage(img, x, y, w, h);
                    break;
                default:
                    ctx.drawImage(img, x, y, w, h);
            }
        }
        
        function drawTemplateBranding(ctx, width, height, brandingHeight) {
            const brandingY = height - brandingHeight + 20;
            
            switch(template) {
                case 'newspaper':
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 28px "Times New Roman"';
                    ctx.textAlign = 'center';
                    ctx.fillText('THE DAILY SNAP', width / 2, brandingY);
                    ctx.font = '14px "Times New Roman"';
                    ctx.fillText('snapstripstudio.com', width / 2, brandingY + 25);
                    break;
                case 'magazine':
                    ctx.fillStyle = '#EC4899';
                    ctx.font = 'bold 32px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('VOGUE', width / 2, brandingY);
                    ctx.fillStyle = '#A855F7';
                    ctx.font = '12px Arial';
                    ctx.fillText('SnapStrip Studio', width / 2, brandingY + 25);
                    break;
                case 'comic':
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 36px "Comic Sans MS"';
                    ctx.textAlign = 'center';
                    ctx.fillText('BOOM!', width / 2, brandingY);
                    ctx.font = '14px "Comic Sans MS"';
                    ctx.fillText('⚡ SnapStrip ⚡', width / 2, brandingY + 28);
                    break;
                case 'movie':
                    ctx.fillStyle = '#FCD34D';
                    ctx.font = 'bold 22px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('A SNAPSTRIP PRODUCTION', width / 2, brandingY);
                    ctx.font = '12px Arial';
                    ctx.fillText('snapstripstudio.com', width / 2, brandingY + 25);
                    break;
                case 'neon':
                    ctx.shadowColor = '#EC4899';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#EC4899';
                    ctx.font = 'bold 28px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚡ SNAPSTRIP ⚡', width / 2, brandingY);
                    ctx.shadowColor = 'transparent';
                    break;
                default:
                    ctx.fillStyle = '#4B5563';
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('SnapStrip Studio', width / 2, brandingY);
                    ctx.fillStyle = '#9CA3AF';
                    ctx.font = '16px Arial';
                    ctx.fillText('snapstripstudio.com', width / 2, brandingY + 30);
            }
        }
        
        // Share functionality
        async function sharePhotoStrip() {
            if (navigator.share) {
                // Create a blob from the first photo (or we could create the strip)
                const response = await fetch(capturedPhotos[0]);
                const blob = await response.blob();
                const file = new File([blob], 'snapstrip.jpg', { type: 'image/jpeg' });
                
                try {
                    await navigator.share({
                        title: 'My SnapStrip Studio Photo Strip',
                        text: 'Check out my photo strip from SnapStrip Studio!',
                        files: [file]
                    });
                } catch (error) {
                    console.log('Share cancelled or failed:', error);
                }
            } else {
                alert('Sharing is not supported on this device. Please download the photo strip instead.');
            }
        }
        
        // Retake all photos
        function retakeAll() {
            if (confirm('Are you sure you want to retake all photos?')) {
                capturedPhotos = [];
                initializePlaceholders();
                photoCount.textContent = `Photo 0/${poses}`;
                downloadBtn.classList.add('hidden');
                shareBtn.classList.add('hidden');
                retakeBtn.classList.add('hidden');
            }
        }
        
        // Event listeners
        startBtn.addEventListener('click', startPhotoSession);
        retakeBtn.addEventListener('click', retakeAll);
        downloadBtn.addEventListener('click', downloadPhotoStrip);
        shareBtn.addEventListener('click', sharePhotoStrip);
        
        // Initialize (don't auto-init camera anymore, wait for source selection)
        initializePlaceholders();
        
        // Only init camera if source mode is already set (e.g., coming back from a refresh)
        // Otherwise, wait for user to choose camera or upload
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
    
</body>

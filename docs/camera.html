<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth - SnapStrip Studio</title>
    <meta name="description" content="Take photos with SnapStrip Studio - Create your photo strip now!">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.ico">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        html {
            overflow-x: hidden;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        #video {
            transform: scaleX(-1); /* Mirror effect for selfie */
        }
        
        .countdown {
            font-size: 150px;
            font-weight: bold;
            color: #FF6B9D;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        .flash {
            animation: flash 0.3s ease-in-out;
        }
        
        .photo-frame {
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .filter-btn {
            transition: all 0.3s ease;
        }
        
        .filter-btn:hover {
            transform: scale(1.1);
        }
        
        .filter-btn.active {
            border: 3px solid #C147E9;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="font-sans overflow-y-auto">
    
    <!-- Main Container -->
    <div class="min-h-screen flex flex-col p-4">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-4">
            <button id="back-btn" class="text-white font-bold text-xl flex items-center gap-2 hover:opacity-80 transition bg-transparent border-none cursor-pointer">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span>Back</span>
            </button>
            
            <div class="text-white text-right">
                <p class="font-bold" id="layout-info">Layout A - 4 Poses</p>
                <p class="text-sm" id="photo-count"><span>Photo</span> 0/4</p>
            </div>
        </div>
        
        <!-- Source Selection (Camera or Upload) -->
        <div id="source-selection" class="glass-effect rounded-3xl p-8 text-center mb-4">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Choose Photo Source</h2>
            <p class="text-gray-600 mb-8">How would you like to add your photos?</p>
            <div class="flex gap-4 justify-center flex-wrap">
                <button id="use-camera-btn" class="bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold py-6 px-12 rounded-2xl text-xl shadow-xl hover:shadow-2xl transform hover:scale-105 transition flex flex-col items-center gap-3">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span>Use Camera</span>
                </button>
                <button id="upload-photos-btn" class="bg-gradient-to-r from-pink-500 to-red-600 text-white font-bold py-6 px-12 rounded-2xl text-xl shadow-xl hover:shadow-2xl transform hover:scale-105 transition flex flex-col items-center gap-3">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <span>Upload Photos</span>
                </button>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
        </div>
        
        <!-- Main Content -->
        <div id="photo-booth-container" class="hidden flex-1 flex flex-col lg:flex-row gap-4">
            
            <!-- Camera Section -->
            <div class="flex-1 glass-effect rounded-3xl p-6 relative flex flex-col min-w-0">
                
                <!-- Video/Canvas Container -->
                <div class="flex-1 bg-black rounded-2xl overflow-hidden relative">
                    <!-- Video Stream -->
                    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                    
                    <!-- Canvas for capturing -->
                    <canvas id="canvas" class="hidden"></canvas>
                    
                    <!-- Flash Effect -->
                    <div id="flash" class="absolute inset-0 bg-white opacity-0 pointer-events-none"></div>
                    
                    <!-- Countdown Overlay -->
                    <div id="countdown-overlay" class="hidden absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                        <div id="countdown-number" class="countdown"></div>
                    </div>
                    
                    <!-- Filter Preview Overlay -->
                    <div id="filter-overlay" class="absolute inset-0 pointer-events-none"></div>
                </div>
                
                <!-- Filters -->
                <div class="mt-4">
                    <p class="text-gray-700 font-semibold mb-2">Filters:</p>
                    <div class="flex gap-2 overflow-x-auto pb-2">
                        <button class="filter-btn active bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="none">
                            <div class="w-16 h-16 bg-gradient-to-br from-gray-200 to-gray-300 rounded"></div>
                            <p class="text-xs mt-1 text-center">None</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="grayscale">
                            <div class="w-16 h-16 bg-gradient-to-br from-gray-400 to-gray-600 rounded"></div>
                            <p class="text-xs mt-1 text-center">B&W</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="sepia">
                            <div class="w-16 h-16 bg-gradient-to-br from-yellow-600 to-orange-700 rounded"></div>
                            <p class="text-xs mt-1 text-center">Sepia</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="vintage">
                            <div class="w-16 h-16 bg-gradient-to-br from-red-300 to-yellow-300 rounded"></div>
                            <p class="text-xs mt-1 text-center">Vintage</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="cool">
                            <div class="w-16 h-16 bg-gradient-to-br from-blue-300 to-cyan-300 rounded"></div>
                            <p class="text-xs mt-1 text-center">Cool</p>
                        </button>
                        <button class="filter-btn bg-white rounded-lg p-3 border-2 border-gray-300" data-filter="warm">
                            <div class="w-16 h-16 bg-gradient-to-br from-orange-300 to-pink-300 rounded"></div>
                            <p class="text-xs mt-1 text-center">Warm</p>
                        </button>
                    </div>
                </div>
                
                <!-- Camera Settings -->
                <div class="mt-4 bg-purple-50 border-2 border-purple-300 rounded-lg p-4">
                    <h3 class="font-bold text-purple-900 mb-3 text-center">📸 Capture Settings</h3>
                    
                    <!-- Capture Mode -->
                    <div class="mb-3">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Capture Mode</label>
                        <div class="flex gap-2">
                            <button id="mode-auto" class="flex-1 bg-purple-600 text-white font-bold py-2 px-4 rounded-lg transition">
                                Auto
                            </button>
                            <button id="mode-manual" class="flex-1 bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg transition">
                                Manual
                            </button>
                        </div>
                    </div>
                    
                    <!-- Timer Setting (only for auto mode) -->
                    <div id="timer-setting" class="mb-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Time between photos: <span id="timer-value" class="text-purple-600 font-bold">3s</span>
                        </label>
                        <input 
                            type="range" 
                            id="timer-slider" 
                            min="2" 
                            max="10" 
                            value="3" 
                            step="1"
                            class="w-full"
                            style="accent-color: #9333EA;"
                        >
                        <div class="flex justify-between text-xs text-gray-500 mt-1">
                            <span>2s</span>
                            <span>10s</span>
                        </div>
                    </div>
                    
                    <p id="mode-description" class="text-xs text-gray-600 text-center mt-2">
                        ⚡ Auto mode: Photos will be taken automatically every 3 seconds
                    </p>
                </div>
                
                <!-- Capture Button -->
                <div class="mt-4 text-center space-y-2">
                    <button id="start-btn" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold py-4 px-12 rounded-full text-xl shadow-2xl hover:shadow-3xl transform hover:scale-105 transition">
                        <span>Start Taking Photos</span>
                    </button>
                    
                    <!-- Manual Capture Button (hidden by default) -->
                    <button id="manual-capture-btn" class="hidden w-full bg-gradient-to-r from-green-500 to-teal-600 text-white font-bold py-4 px-12 rounded-full text-xl shadow-2xl hover:shadow-3xl transform hover:scale-105 transition">
                        <span>📸 Take Photo (<span id="current-photo-num">1</span>/<span id="total-photos">4</span>)</span>
                    </button>
                    
                    <!-- Continue to Preview Button (shown after all photos taken) -->
                    <button id="continue-btn" class="hidden w-full bg-gradient-to-r from-purple-500 to-pink-600 text-white font-bold py-4 px-12 rounded-full text-xl shadow-2xl hover:shadow-3xl transform hover:scale-105 transition animate-pulse">
                        <span>✨ Continue to Preview & Edit</span>
                    </button>
                    
                    <button id="retake-btn" class="hidden w-full bg-gray-600 text-white font-bold py-3 px-8 rounded-full text-lg shadow-xl hover:bg-gray-700 transition">
                        <span>🔄 Retake All</span>
                    </button>
                </div>
            </div>
            
            <!-- Photo Strip Preview -->
            <div class="w-full lg:w-96 glass-effect rounded-3xl p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">Your Photo Strip</h2>
                
                <!-- Photo Strip Container -->
                <div id="photo-strip" class="bg-white p-4 rounded-lg shadow-xl max-w-full">
                    <div id="strip-photos" class="space-y-2 flex flex-col items-center">
                        <!-- Photos will be added here -->
                    </div>
                    
                    <!-- Branding -->
                    <div class="mt-3 pt-3 border-t-2 border-gray-300 text-center">
                        <p class="text-xs font-bold text-gray-600">SnapStrip Studio</p>
                        <p class="text-xs text-gray-400">thanhnguyxn.github.io/Photo-Booth</p>
                    </div>
                </div>
                
                <!-- Edit/Download Buttons -->
                <button id="edit-btn" class="hidden w-full mt-4 bg-gradient-to-r from-purple-500 to-pink-600 text-white font-bold py-3 px-6 rounded-full shadow-xl hover:shadow-2xl transform hover:scale-105 transition">
                    <span>✨ Edit & Add Text</span>
                </button>
                
                <button id="download-btn" class="hidden w-full mt-2 bg-gradient-to-r from-green-500 to-teal-600 text-white font-bold py-2 px-6 rounded-full shadow-xl hover:shadow-2xl transform hover:scale-105 transition">
                    <span>� Skip & Download</span>
                </button>
            </div>
            
        </div>
    </div>
    
    <!-- Scripts -->
    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const layout = urlParams.get('layout') || 'A';
        const poses = parseInt(urlParams.get('poses')) || 4;
        const template = urlParams.get('template') || 'classic';
        
        // Load customization from localStorage
        let customization = {
            username: '@yourname',
            headline: 'HEADLINE',
            subtitle: 'Subtitle text',
            date: new Date().toLocaleDateString(),
            location: 'Location',
            message: 'Your message'
        };
        
        // Text scale from customization (default 1.0)
        let userTextScale = 1.0;
        
        try {
            const savedCustomization = localStorage.getItem('templateCustomization');
            if (savedCustomization) {
                const parsed = JSON.parse(savedCustomization);
                customization = {
                    username: parsed.username && parsed.username.trim() !== '' ? parsed.username : '@yourname',
                    headline: parsed.headline && parsed.headline.trim() !== '' ? parsed.headline : 'HEADLINE',
                    subtitle: parsed.subtitle && parsed.subtitle.trim() !== '' ? parsed.subtitle : 'Subtitle text',
                    date: parsed.date ? new Date(parsed.date).toLocaleDateString() : new Date().toLocaleDateString(),
                    location: parsed.location && parsed.location.trim() !== '' ? parsed.location : 'Location',
                    message: parsed.message && parsed.message.trim() !== '' ? parsed.message : 'Your message'
                };
                userTextScale = parsed.textScale || 1.0;
                console.log('✅ Loaded customization:', customization, 'Text Scale:', userTextScale);
            } else {
                console.log('ℹ️ No customization found, using defaults');
            }
        } catch (error) {
            console.log('⚠️ Failed to load customization, using defaults');
        }
        
        // Debug: Log template selection
        console.log('📸 Camera Page Loaded');
        console.log('Layout:', layout, '| Poses:', poses, '| Template:', template);
        
        // Update layout info
        document.getElementById('layout-info').textContent = `Layout ${layout} - ${poses} Poses - ${template.charAt(0).toUpperCase() + template.slice(1)}`;
        
        // Elements
        const sourceSelection = document.getElementById('source-selection');
        const photoBoothContainer = document.getElementById('photo-booth-container');
        const useCameraBtn = document.getElementById('use-camera-btn');
        const uploadPhotosBtn = document.getElementById('upload-photos-btn');
        const fileInput = document.getElementById('file-input');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const continueBtn = document.getElementById('continue-btn');
        const editBtn = document.getElementById('edit-btn');
        const downloadBtn = document.getElementById('download-btn');
        const flash = document.getElementById('flash');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownNumber = document.getElementById('countdown-number');
        const photoCount = document.getElementById('photo-count');
        const stripPhotos = document.getElementById('strip-photos');
        const filterOverlay = document.getElementById('filter-overlay');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const backBtn = document.getElementById('back-btn');
        
        // Capture mode settings
        const modeAutoBtn = document.getElementById('mode-auto');
        const modeManualBtn = document.getElementById('mode-manual');
        const timerSetting = document.getElementById('timer-setting');
        const timerSlider = document.getElementById('timer-slider');
        const timerValue = document.getElementById('timer-value');
        const modeDescription = document.getElementById('mode-description');
        const manualCaptureBtn = document.getElementById('manual-capture-btn');
        const currentPhotoNum = document.getElementById('current-photo-num');
        const totalPhotosSpan = document.getElementById('total-photos');
        
        // Capture settings state
        let captureMode = 'auto'; // 'auto' or 'manual'
        let captureTimer = 3; // seconds between photos in auto mode
        
        // Update total photos display
        totalPhotosSpan.textContent = poses;
        
        // Mode toggle handlers
        modeAutoBtn.addEventListener('click', () => {
            captureMode = 'auto';
            modeAutoBtn.classList.remove('bg-gray-300', 'text-gray-700');
            modeAutoBtn.classList.add('bg-purple-600', 'text-white');
            modeManualBtn.classList.remove('bg-purple-600', 'text-white');
            modeManualBtn.classList.add('bg-gray-300', 'text-gray-700');
            timerSetting.classList.remove('hidden');
            modeDescription.textContent = `⚡ Auto mode: Photos will be taken automatically every ${captureTimer} seconds`;
        });
        
        modeManualBtn.addEventListener('click', () => {
            captureMode = 'manual';
            modeManualBtn.classList.remove('bg-gray-300', 'text-gray-700');
            modeManualBtn.classList.add('bg-purple-600', 'text-white');
            modeAutoBtn.classList.remove('bg-purple-600', 'text-white');
            modeAutoBtn.classList.add('bg-gray-300', 'text-gray-700');
            timerSetting.classList.add('hidden');
            modeDescription.textContent = '👆 Manual mode: Click the button to take each photo when ready';
        });
        
        // Timer slider handler
        timerSlider.addEventListener('input', (e) => {
            captureTimer = parseInt(e.target.value);
            timerValue.textContent = captureTimer + 's';
            modeDescription.textContent = `⚡ Auto mode: Photos will be taken automatically every ${captureTimer} seconds`;
        });
        
        // Back button handler - go back to customize or templates page
        backBtn.addEventListener('click', () => {
            // Templates that have customization page
            const templatesWithCustomization = [
                'instagram', 'macbook', 'newspaper', 'magazine', 
                'movie', 'passport', 'vintage', 'comic', 'scrapbook'
            ];
            
            if (templatesWithCustomization.includes(template)) {
                // Go back to customize page
                window.location.href = `customize.html?layout=${layout}&poses=${poses}&template=${template}`;
            } else {
                // Go back to templates page (for classic, polaroid, neon, minimalist)
                window.location.href = `templates.html?layout=${layout}&poses=${poses}`;
            }
        });
        
        // State
        let stream = null;
        let capturedPhotos = [];
        let currentFilter = 'none';
        let isCapturing = false;
        let sourceMode = null; // 'camera' or 'upload'
        
        // Source selection handlers
        useCameraBtn.addEventListener('click', () => {
            sourceMode = 'camera';
            sourceSelection.classList.add('hidden');
            photoBoothContainer.classList.remove('hidden');
            initCamera();
            initializePlaceholders();
        });
        
        uploadPhotosBtn.addEventListener('click', () => {
            sourceMode = 'upload';
            fileInput.click();
        });
        
        // File upload handler
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            
            if (files.length === 0) return;
            
            // Check if enough photos
            if (files.length < poses) {
                alert(`Please select at least ${poses} photos for your layout.`);
                return;
            }
            
            // Hide source selection and show photo booth
            sourceSelection.classList.add('hidden');
            photoBoothContainer.classList.remove('hidden');
            initializePlaceholders();
            
            // Process uploaded photos
            capturedPhotos = [];
            for (let i = 0; i < Math.min(poses, files.length); i++) {
                const file = files[i];
                const img = await loadImage(file);
                
                // Use original image dimensions (flexible aspect ratio)
                const photoWidth = img.width;
                const photoHeight = img.height;
                
                const photoCanvas = document.createElement('canvas');
                photoCanvas.width = photoWidth;
                photoCanvas.height = photoHeight;
                const photoCtx = photoCanvas.getContext('2d');
                
                // Draw image to canvas
                photoCtx.drawImage(img, 0, 0, photoWidth, photoHeight);
                
                // Apply filter
                const imageData = photoCtx.getImageData(0, 0, photoWidth, photoHeight);
                applyFilterToImageData(imageData);
                photoCtx.putImageData(imageData, 0, 0);
                
                // Create final canvas with template
                const templateCanvas = document.createElement('canvas');
                const templateCtx = templateCanvas.getContext('2d');
                const padding = 40;
                templateCanvas.width = photoWidth + (padding * 2);
                templateCanvas.height = photoHeight + (padding * 2);
                
                // Draw template background/border
                drawPhotoTemplateFrame(templateCtx, 0, 0, templateCanvas.width, templateCanvas.height, i);
                
                // Draw photo in center
                templateCtx.drawImage(photoCanvas, padding, padding, photoWidth, photoHeight);
                
                // Draw template text overlay (after photo so it's visible)
                drawTemplateTextOverlay(templateCtx, templateCanvas.width, templateCanvas.height, padding);
                
                // Save photo
                const photoData = templateCanvas.toDataURL('image/jpeg', 0.92);
                capturedPhotos.push(photoData);
                
                // Update preview
                const photoElement = document.getElementById(`photo-${i}`);
                photoElement.innerHTML = `<img src="${photoData}" class="w-full h-auto rounded-lg">`;
                photoCount.textContent = `Photo ${i + 1}/${poses}`;
            }
            
            // Show edit/download buttons
            startBtn.classList.add('hidden');
            retakeBtn.classList.remove('hidden');
            editBtn.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
        });
        
        // Helper function to load image from file
        function loadImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // Initialize placeholders based on layout
        function initializePlaceholders() {
            stripPhotos.innerHTML = '';
            for (let i = 0; i < poses; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'photo-frame max-w-full bg-white rounded-lg overflow-hidden relative border-2 border-gray-200';
                placeholder.id = `photo-${i}`;
                
                // Create canvas for template preview (flexible size)
                const previewCanvas = document.createElement('canvas');
                previewCanvas.width = 600;
                previewCanvas.height = 400;
                const previewCtx = previewCanvas.getContext('2d');
                
                // Draw template frame preview
                drawPhotoTemplateFrame(previewCtx, 0, 0, 600, 400, i);
                
                // Draw text overlay preview (so user can see customization)
                drawTemplateTextOverlay(previewCtx, 600, 400, 40);
                
                // Add semi-transparent number overlay
                previewCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                previewCtx.fillRect(0, 0, 600, 400);
                previewCtx.fillStyle = '#FFF';
                previewCtx.font = 'bold 80px Arial';
                previewCtx.textAlign = 'center';
                previewCtx.textBaseline = 'middle';
                previewCtx.fillText((i + 1).toString(), 300, 200);
                
                // Convert canvas to image
                const previewImg = document.createElement('img');
                previewImg.src = previewCanvas.toDataURL();
                previewImg.className = 'w-full h-auto';
                placeholder.appendChild(previewImg);
                
                stripPhotos.appendChild(placeholder);
            }
        }
        
        // Initialize camera
        async function initCamera() {
            try {
                // Detect device type
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                // Configure camera based on device
                const videoConstraints = {
                    audio: false,
                    video: {
                        facingMode: 'user',
                        width: { ideal: isMobile ? 720 : 1280 },
                        height: { ideal: isMobile ? 1280 : 720 }
                    }
                };
                
                stream = await navigator.mediaDevices.getUserMedia(videoConstraints);
                video.srcObject = stream;
                
                console.log('📷 Camera initialized:', isMobile ? 'Mobile (Portrait)' : 'Desktop (Landscape)');
                console.log('Resolution:', video.videoWidth, 'x', video.videoHeight);
                
                // Set canvas size when video is loaded
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
            } catch (error) {
                alert('Could not access camera. Please ensure camera permissions are granted.\n\nError: ' + error.message);
                console.error('Camera error:', error);
            }
        }
        
        // Apply filter
        function applyFilter(filter) {
            const filters = {
                'none': 'none',
                'grayscale': 'grayscale(100%)',
                'sepia': 'sepia(100%)',
                'vintage': 'sepia(50%) contrast(120%) brightness(90%)',
                'cool': 'hue-rotate(180deg) saturate(150%)',
                'warm': 'sepia(30%) saturate(150%) brightness(110%)'
            };
            
            video.style.filter = filters[filter] || 'none';
            currentFilter = filter;
        }
        
        // Apply filter to canvas (for uploaded images or captured photos)
        function applyFilterToCanvas(filter) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            applyFilterToImageData(imageData);
            ctx.putImageData(imageData, 0, 0);
        }
        
        // Apply filter to ImageData object
        function applyFilterToImageData(imageData) {
            const data = imageData.data;
            
            switch(currentFilter) {
                case 'grayscale':
                    for (let i = 0; i < data.length; i += 4) {
                        const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                        data[i] = data[i + 1] = data[i + 2] = gray;
                    }
                    break;
                case 'sepia':
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i + 1], b = data[i + 2];
                        data[i] = Math.min(255, r * 0.393 + g * 0.769 + b * 0.189);
                        data[i + 1] = Math.min(255, r * 0.349 + g * 0.686 + b * 0.168);
                        data[i + 2] = Math.min(255, r * 0.272 + g * 0.534 + b * 0.131);
                    }
                    break;
                case 'vintage':
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i + 1], b = data[i + 2];
                        data[i] = Math.min(255, (r * 0.393 + g * 0.769 + b * 0.189) * 1.1);
                        data[i + 1] = Math.min(255, (r * 0.349 + g * 0.686 + b * 0.168) * 0.9);
                        data[i + 2] = Math.min(255, (r * 0.272 + g * 0.534 + b * 0.131) * 0.8);
                    }
                    break;
                case 'cool':
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = Math.min(255, data[i] * 0.7);
                        data[i + 1] = Math.min(255, data[i + 1] * 1.2);
                        data[i + 2] = Math.min(255, data[i + 2] * 1.3);
                    }
                    break;
                case 'warm':
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = Math.min(255, data[i] * 1.2);
                        data[i + 1] = Math.min(255, data[i + 1] * 1.1);
                        data[i + 2] = Math.min(255, data[i + 2] * 0.8);
                    }
                    break;
            }
        }
        
        // Filter buttons
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                applyFilter(filter);
            });
        });
        
        // Countdown
        async function countdown() {
            countdownOverlay.classList.remove('hidden');
            for (let i = 3; i > 0; i--) {
                countdownNumber.textContent = i;
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            countdownNumber.textContent = '📸';
            await new Promise(resolve => setTimeout(resolve, 300));
            countdownOverlay.classList.add('hidden');
        }
        
        // Capture photo
        function capturePhoto() {
            // Flash effect
            flash.classList.add('flash');
            setTimeout(() => flash.classList.remove('flash'), 300);
            
            // Use actual video dimensions (flexible aspect ratio)
            const photoWidth = video.videoWidth;
            const photoHeight = video.videoHeight;
            
            const photoCanvas = document.createElement('canvas');
            photoCanvas.width = photoWidth;
            photoCanvas.height = photoHeight;
            const photoCtx = photoCanvas.getContext('2d');
            
            // Draw video frame (mirrored for selfie mode)
            photoCtx.save();
            photoCtx.scale(-1, 1); // Mirror
            photoCtx.drawImage(video, 0, 0, photoWidth, photoHeight, -photoWidth, 0, photoWidth, photoHeight);
            photoCtx.restore();
            
            // Apply filter to canvas
            const imageData = photoCtx.getImageData(0, 0, photoWidth, photoHeight);
            applyFilterToImageData(imageData);
            photoCtx.putImageData(imageData, 0, 0);
            
            // Create final canvas with template effects
            const templateCanvas = document.createElement('canvas');
            const templateCtx = templateCanvas.getContext('2d');
            
            // Set canvas size with padding for template effects
            const padding = 40;
            templateCanvas.width = photoWidth + (padding * 2);
            templateCanvas.height = photoHeight + (padding * 2);
            
            // Draw template background/border
            drawPhotoTemplateFrame(templateCtx, 0, 0, templateCanvas.width, templateCanvas.height, capturedPhotos.length);
            
            // Draw the photo in the center
            templateCtx.drawImage(photoCanvas, padding, padding, photoWidth, photoHeight);
            
            // Get image data with template
            const finalImageData = templateCanvas.toDataURL('image/jpeg', 0.92);
            capturedPhotos.push(finalImageData);
            
            // Update UI
            const photoIndex = capturedPhotos.length - 1;
            const photoElement = document.getElementById(`photo-${photoIndex}`);
            if (photoElement) {
                photoElement.innerHTML = `<img src="${finalImageData}" class="w-full h-auto rounded-lg">`;
            }
            
            // Update counter
            photoCount.textContent = `Photo ${capturedPhotos.length}/${poses}`;
            
            return finalImageData;
        }
        
        // Start photo session
        async function startPhotoSession() {
            if (isCapturing) return;
            isCapturing = true;
            startBtn.classList.add('hidden');
            
            capturedPhotos = [];
            initializePlaceholders();
            
            if (captureMode === 'auto') {
                // Auto mode - take photos automatically with timer
                for (let i = 0; i < poses; i++) {
                    currentPhotoNum.textContent = i + 1;
                    await countdown();
                    capturePhoto();
                    
                    // Wait before next photo (except for last one)
                    if (i < poses - 1) {
                        await new Promise(resolve => setTimeout(resolve, captureTimer * 1000));
                    }
                }
                
                // Session complete - show continue and retake buttons
                isCapturing = false;
                continueBtn.classList.remove('hidden');
                retakeBtn.classList.remove('hidden');
                
            } else {
                // Manual mode - show manual capture button
                manualPhotoIndex = 0; // Reset manual photo index
                manualCaptureBtn.classList.remove('hidden');
                currentPhotoNum.textContent = '1';
            }
        }
        
        // Manual capture handler
        let manualPhotoIndex = 0;
        manualCaptureBtn.addEventListener('click', async () => {
            if (manualPhotoIndex >= poses) return;
            
            console.log(`📸 Manual capture: Taking photo ${manualPhotoIndex + 1}/${poses}`);
            
            manualCaptureBtn.disabled = true;
            manualCaptureBtn.classList.add('opacity-50');
            
            try {
                await countdown();
                capturePhoto();
                
                manualPhotoIndex++;
                console.log(`✅ Photo captured. Index now: ${manualPhotoIndex}`);
                
                // Check if all photos taken
                if (manualPhotoIndex >= poses) {
                    console.log('🎉 All photos captured!');
                    manualCaptureBtn.classList.add('hidden');
                    isCapturing = false;
                    continueBtn.classList.remove('hidden');
                    retakeBtn.classList.remove('hidden');
                } else {
                    // Update for next photo
                    currentPhotoNum.textContent = manualPhotoIndex + 1;
                    console.log(`📍 Ready for next photo (${manualPhotoIndex + 1}/${poses})`);
                }
            } catch (error) {
                console.error('❌ Error during manual capture:', error);
            } finally {
                // Always re-enable button if not done
                if (manualPhotoIndex < poses) {
                    manualCaptureBtn.disabled = false;
                    manualCaptureBtn.classList.remove('opacity-50');
                    console.log('🔓 Button re-enabled');
                }
            }
        });

        // Download photo strip
        function downloadPhotoStrip() {

            const stripCanvas = document.createElement('canvas');
            const stripCtx = stripCanvas.getContext('2d');

        // Template rendering functions
        // Draw template frame for individual photo (used in preview)
        function drawPhotoTemplateFrame(ctx, x, y, width, height, index) {
            switch(template) {
                case 'newspaper':
                    // Realistic newspaper with aged paper and typography
                    // Background gradient (aged paper)
                    const newsGrad = ctx.createLinearGradient(x, y, x, y + height);
                    newsGrad.addColorStop(0, '#FFFBEB');
                    newsGrad.addColorStop(0.3, '#FEF3C7');
                    newsGrad.addColorStop(0.7, '#FDE68A');
                    newsGrad.addColorStop(1, '#FCD34D');
                    ctx.fillStyle = newsGrad;
                    ctx.fillRect(x, y, width, height);
                    
                    // Add subtle texture/noise effect
                    ctx.fillStyle = 'rgba(139, 92, 46, 0.02)';
                    for (let i = 0; i < 100; i++) {
                        ctx.fillRect(
                            x + Math.random() * width,
                            y + Math.random() * height,
                            2, 2
                        );
                    }
                    
                    // Double border (classic newspaper)
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 8;
                    ctx.strokeRect(x + 10, y + 10, width - 20, height - 20);
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x + 18, y + 18, width - 36, height - 36);
                    
                    // Header section (THE DAILY SNAP)
                    const headerHeight = Math.max(60, height * 0.12);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x + 24, y + 24, width - 48, headerHeight);
                    
                    // Newspaper name
                    ctx.fillStyle = '#FCD34D';
                    ctx.font = `bold ${Math.round(headerHeight * 0.35)}px "Times New Roman", Georgia, serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('THE DAILY SNAP', x + width / 2, y + 24 + headerHeight / 2 - 8);
                    
                    // Date line
                    ctx.font = `${Math.round(headerHeight * 0.15)}px "Times New Roman", Georgia, serif`;
                    ctx.fillText(customization.date || new Date().toLocaleDateString('en-US', {
                        weekday: 'long',
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    }), x + width / 2, y + 24 + headerHeight - 10);
                    
                    // Decorative line under header
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x + 28, y + 28 + headerHeight);
                    ctx.lineTo(x + width - 28, y + 28 + headerHeight);
                    ctx.stroke();
                    
                    // Column lines (newspaper style)
                    const contentStartY = y + 32 + headerHeight;
                    const contentHeight = height - (32 + headerHeight + 20);
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                    ctx.lineWidth = 1;
                    
                    // Divide into 3 columns
                    const colWidth = (width - 56) / 3;
                    ctx.beginPath();
                    ctx.moveTo(x + 28 + colWidth, contentStartY);
                    ctx.lineTo(x + 28 + colWidth, contentStartY + contentHeight);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(x + 28 + colWidth * 2, contentStartY);
                    ctx.lineTo(x + 28 + colWidth * 2, contentStartY + contentHeight);
                    ctx.stroke();
                    
                    break;
                    
                case 'magazine':
                    // Glamorous fashion magazine cover style
                    // Background gradient (premium magazine)
                    const magGrad = ctx.createLinearGradient(x, y, x + width, y + height);
                    magGrad.addColorStop(0, '#FDF2F8');
                    magGrad.addColorStop(0.3, '#FCE7F3');
                    magGrad.addColorStop(0.6, '#FBCFE8');
                    magGrad.addColorStop(1, '#FAE8FF');
                    ctx.fillStyle = magGrad;
                    ctx.fillRect(x, y, width, height);
                    
                    // Elegant border with shadow
                    ctx.shadowColor = 'rgba(236, 72, 153, 0.4)';
                    ctx.shadowBlur = 20;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 4;
                    ctx.strokeStyle = '#EC4899';
                    ctx.lineWidth = 6;
                    ctx.strokeRect(x + 12, y + 12, width - 24, height - 24);
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                    
                    // Magazine logo area (top)
                    const logoHeight = Math.max(45, height * 0.09);
                    
                    // VOGUE-style logo
                    ctx.font = `bold ${Math.round(logoHeight * 0.7)}px "Didot", "Bodoni MT", Georgia, serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    // Text with outline for premium look
                    ctx.strokeStyle = '#A855F7';
                    ctx.lineWidth = 2;
                    ctx.strokeText(customization.headline || 'VOGUE', x + width / 2, y + logoHeight / 2 + 14);
                    
                    ctx.fillStyle = '#EC4899';
                    ctx.fillText(customization.headline || 'VOGUE', x + width / 2, y + logoHeight / 2 + 14);
                    
                    // Date/Issue info
                    ctx.font = `${Math.round(logoHeight * 0.18)}px "Helvetica Neue", Arial, sans-serif`;
                    ctx.fillStyle = '#A855F7';
                    const dateStr = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
                    ctx.fillText(dateStr, x + width / 2, y + logoHeight + 4);
                    
                    // Barcode at bottom (realistic magazine element)
                    const barcodeWidth = width * 0.3;
                    const barcodeHeight = 30;
                    const barcodeX = x + width - barcodeWidth - 20;
                    const barcodeY = y + height - barcodeHeight - 15;
                    
                    ctx.fillStyle = '#000';
                    ctx.fillRect(barcodeX, barcodeY, barcodeWidth, barcodeHeight);
                    
                    // Barcode lines
                    ctx.fillStyle = '#FFF';
                    const barWidth = barcodeWidth / 20;
                    for (let i = 0; i < 20; i++) {
                        if (i % 3 !== 0) { // Make pattern more realistic
                            ctx.fillRect(
                                barcodeX + i * barWidth + barWidth * 0.3,
                                barcodeY + 3,
                                barWidth * (i % 2 === 0 ? 0.2 : 0.15),
                                barcodeHeight - 10
                            );
                        }
                    }
                    
                    // Magazine price/issue number
                    ctx.fillStyle = '#A855F7';
                    ctx.font = 'bold 10px Arial, sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText('$9.99', x + 20, y + height - 12);
                    ctx.textAlign = 'right';
                    ctx.fillText('VOL. 2025', x + barcodeX - 10, y + height - 12);
                    
                    break;
                    
                case 'comic':
                    // Bold comic book style with halftone pattern and action effects
                    // Radial gradient background (pop art style)
                    const comicGrad = ctx.createRadialGradient(x + width/2, y + height/2, 0, x + width/2, y + height/2, Math.max(width, height) * 0.6);
                    comicGrad.addColorStop(0, '#FEF08A');
                    comicGrad.addColorStop(0.5, '#FBBF24');
                    comicGrad.addColorStop(1, '#FCA5A5');
                    ctx.fillStyle = comicGrad;
                    ctx.fillRect(x, y, width, height);
                    
                    // Halftone dots pattern (Ben-Day dots comic effect)
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.15)';
                    const dotSpacing = 8;
                    for (let dx = 0; dx < width; dx += dotSpacing) {
                        for (let dy = 0; dy < height; dy += dotSpacing) {
                            ctx.beginPath();
                            ctx.arc(x + dx, y + dy, 1.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    
                    // Thick black border (comic panel style)
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 10;
                    ctx.strokeRect(x + 10, y + 10, width - 20, height - 20);
                    
                    // Inner white accent border
                    ctx.strokeStyle = '#FFF';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x + 16, y + 16, width - 32, height - 32);

                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 22, y + 22, width - 44, height - 44);
                    
                    // Action word bubbles (POW, BAM, KAPOW!)
                    const words = ['POW!', 'BAM!', 'KAPOW!'];
                    const wordIndex = index % words.length;
                    const word = words[wordIndex];
                    
                    // Speech bubble at top
                    const bubbleWidth = Math.min(width * 0.4, 100);
                    const bubbleHeight = 30;
                    const bubbleX = x + width - bubbleWidth - 25;
                    const bubbleY = y + 25;
                    
                    // Bubble background (yellow with black border)
                    ctx.fillStyle = '#FEF08A';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.roundRect(bubbleX, bubbleY, bubbleWidth, bubbleHeight, 5);
                    ctx.fill();
                    ctx.stroke();
                    
                    // Bubble text
                    ctx.fillStyle = '#000';
                    ctx.font = `bold ${Math.round(bubbleHeight * 0.55)}px "Comic Sans MS", "Comic Neue", cursive`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(word, bubbleX + bubbleWidth / 2, bubbleY + bubbleHeight / 2);
                    
                    // Star burst effects at corners
                    ctx.fillStyle = '#FACC15';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    
                    // Draw small star bursts
                    function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                        let rot = Math.PI / 2 * 3;
                        let step = Math.PI / spikes;
                        
                        ctx.beginPath();
                        ctx.moveTo(cx, cy - outerRadius);
                        
                        for (let i = 0; i < spikes; i++) {
                            ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                            rot += step;
                            ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                            rot += step;
                        }
                        ctx.lineTo(cx, cy - outerRadius);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    }
                    
                    drawStar(x + 35, y + 35, 8, 12, 6);
                    drawStar(x + width - 35, y + height - 35, 8, 12, 6);
                    
                    break;
                    
                case 'polaroid':
                    // Classic polaroid with realistic thick white border and shadow
                    // Background (table/surface)
                    ctx.fillStyle = '#F3F4F6';
                    ctx.fillRect(x, y, width, height);
                    
                    // Polaroid frame with shadow
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                    ctx.shadowOffsetX = 6;
                    ctx.shadowOffsetY = 8;
                    ctx.shadowBlur = 20;
                    
                    // White Polaroid border (thicker at bottom for writing space)
                    const polWidth = width * 0.88;
                    const polHeight = height * 0.82;

                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(polX, polY, polWidth, polHeight);
                    
                    // Reset shadow
                    ctx.shadowColor = 'transparent';
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                    ctx.shadowBlur = 0;
                    
                    // Photo area (slightly darker to show distinction)
                    const photoMargin = polWidth * 0.045;
                    const bottomSpace = polHeight * 0.18; // Space for writing
                    const photoWidth = polWidth - photoMargin * 2;
                    const photoHeight = polHeight - photoMargin - bottomSpace;
                    
                    ctx.fillStyle = '#E5E7EB';
                    ctx.fillRect(
                        polX + photoMargin,
                        polY + photoMargin,
                        photoWidth,
                        photoHeight
                    );
                    
                    // Handwritten text area (bottom white space)
                    ctx.fillStyle = '#9CA3AF';
                    ctx.font = 'italic 11px "Brush Script MT", cursive, sans-serif';

                        customization.message || 'memories...',
                        polX + polWidth / 2,
                        polY + polHeight - bottomSpace / 2 + 3
                    );
                    
                    // Slight rotation effect for realism
                    ctx.save();
                    ctx.translate(polX + polWidth / 2, polY + polHeight / 2);
                    ctx.rotate((index % 2 === 0 ? 1 : -1) * 0.02); // Slight tilt
                    ctx.translate(-(polX + polWidth / 2), -(polY + polHeight / 2));
                    ctx.restore();
                    
                    break;
                    
                case 'passport':
                    // Official passport/ID card style with realistic government document look
                    // Patriotic gradient background
                    const passGrad = ctx.createLinearGradient(x, y, x + width, y);
                    passGrad.addColorStop(0, '#1E40AF'); // Blue
                    passGrad.addColorStop(0.2, '#1E3A8A');
                    passGrad.addColorStop(0.5, '#7C2D12'); // Red-brown
                    passGrad.addColorStop(0.8, '#991B1B'); // Dark red
                    passGrad.addColorStop(1, '#7F1D1D');
                    ctx.fillStyle = passGrad;
                    ctx.fillRect(x, y, width, height);
                    
                    // Gold official border (double frame)

                    ctx.lineWidth = 3;
                    ctx.strokeRect(x + 18, y + 18, width - 36, height - 36);
                    
                    // Header section (PASSPORT)

                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#FCD34D';
                    ctx.fillText('🦅', x + width / 2, y + 24 + passHeaderHeight / 2 - 8);
                    
                    // PASSPORT text
                    ctx.font = `bold ${Math.round(passHeaderHeight * 0.25)}px "Arial", sans-serif`;
                    ctx.fillStyle = '#FCD34D';
                    ctx.fillText('PASSPORT', x + width / 2, y + 24 + passHeaderHeight - 8);
                    
                    // White content area (photo and info section)
                    const contentY = y + 28 + passHeaderHeight;
                    const passContentHeight = height - (32 + passHeaderHeight + 50);
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(x + 28, contentY, width - 56, passContentHeight);
                    
                    // Info fields grid (realistic passport data fields)
                    ctx.strokeStyle = '#D1D5DB';
                    ctx.lineWidth = 1;
                    const fieldHeight = passContentHeight / 4;
                    
                    for (let i = 1; i < 4; i++) {

                    ctx.strokeRect(20, 20, width - 40, height - 40);
                    break;
                case 'comic':
                    const comicGrad = ctx.createLinearGradient(0, 0, width, height);
                    comicGrad.addColorStop(0, '#FEF08A');
                    comicGrad.addColorStop(1, '#FCA5A5');
                    ctx.fillStyle = comicGrad;
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 10;
                    ctx.strokeRect(15, 15, width - 30, height - 30);
                    break;
                case 'polaroid':
                    ctx.fillStyle = '#F9FAFB';
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'passport':
                    const passGrad = ctx.createLinearGradient(0, 0, width, 0);
                    passGrad.addColorStop(0, '#1E3A8A');
                    passGrad.addColorStop(1, '#991B1B');
                    ctx.fillStyle = passGrad;
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#FCD34D';
                    ctx.lineWidth = 8;
                    ctx.strokeRect(15, 15, width - 30, height - 30);
                    break;
                case 'movie':
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#FCD34D';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(20, 20, width - 40, height - 40);
                    break;
                case 'vintage':
                    ctx.fillStyle = '#FEF3C7';
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#92400E';
                    ctx.lineWidth = 16;
                    ctx.strokeRect(20, 20, width - 40, height - 40);
                    ctx.strokeRect(28, 28, width - 56, height - 56);
                    break;
                case 'neon':
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'scrapbook':
                    const scrapGrad = ctx.createLinearGradient(0, 0, width, height);
                    scrapGrad.addColorStop(0, '#FEF3F2');
                    scrapGrad.addColorStop(0.5, '#EFF6FF');
                    scrapGrad.addColorStop(1, '#FEF3F2');
                    ctx.fillStyle = scrapGrad;
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'minimalist':
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#D1D5DB';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(30, 30, width - 60, height - 60);
                    break;
                case 'instagram':
                    const instaGrad = ctx.createLinearGradient(0, 0, width, height);
                    instaGrad.addColorStop(0, '#A855F7');
                    instaGrad.addColorStop(0.5, '#EC4899');
                    instaGrad.addColorStop(1, '#FACC15');
                    ctx.fillStyle = instaGrad;
                    ctx.fillRect(0, 0, width, height);
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(15, 15, width - 30, height - 30);
                    break;
                default:
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, width, height);
            }
        }
        
        function drawPhotoWithTemplate(ctx, img, x, y, w, h, index) {
            switch(template) {
                case 'newspaper':
                case 'comic':
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x - 3, y - 3, w + 6, h + 6);
                    ctx.drawImage(img, x, y, w, h);
                    break;
                case 'polaroid':
                    ctx.fillStyle = '#FFF';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(x - 12, y - 12, w + 24, h + 40);
                    ctx.shadowColor = 'transparent';
                    ctx.drawImage(img, x, y, w, h);
                    break;
                case 'passport':
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(x - 8, y - 8, w + 16, h + 16);
                    ctx.drawImage(img, x, y, w, h);
                    break;
                case 'neon':
                    ctx.shadowColor = index % 2 === 0 ? '#EC4899' : '#06B6D4';
                    ctx.shadowBlur = 20;
                    ctx.drawImage(img, x, y, w, h);
                    ctx.shadowColor = 'transparent';
                    break;
                case 'scrapbook':
                    ctx.save();
                    ctx.setLineDash([8, 4]);
                    ctx.strokeStyle = ['#EC4899', '#06B6D4', '#FACC15'][index % 3];
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x - 4, y - 4, w + 8, h + 8);
                    ctx.setLineDash([]);
                    ctx.restore();
                    ctx.drawImage(img, x, y, w, h);
                    break;
                default:
                    ctx.drawImage(img, x, y, w, h);
            }
        }
        
        // Draw text overlay on photos (after photo is drawn)
        function drawTemplateTextOverlay(ctx, canvasWidth, canvasHeight, padding) {
            // Scale text based on layout - larger base sizes, less aggressive scaling
            const layoutScale = poses === 4 ? 0.85 : poses === 3 ? 0.95 : 1.0;
            
            // Combine layout scale with user's text scale preference
            const textScale = layoutScale * userTextScale;
            
            // Helper function for text with shadow/outline
            function drawTextWithShadow(text, x, y, fontSize, fillColor = '#FFF', shadowColor = '#000') {
                const scaledSize = Math.round(fontSize * textScale);
                ctx.shadowColor = shadowColor;
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                ctx.fillStyle = fillColor;
                ctx.fillText(text, x, y);
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }
            
            // Helper to get scaled font string
            function getFont(size, family) {
                return `bold ${Math.round(size * textScale)}px ${family}`;
            }
            
            switch(template) {
                case 'instagram':
                    // Username at top - INSIDE the padding area (before photo starts)
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(8, 8, canvasWidth - 16, padding - 8);
                    ctx.fillStyle = '#000';
                    ctx.font = getFont(28, 'Arial, sans-serif'); // 24→28
                    ctx.textAlign = 'left';
                    ctx.fillText(customization.username, 24, padding - 12);
                    
                    // Profile pic circle
                    const circleRadius = Math.round(18 * textScale); // 16→18
                    ctx.beginPath();
                    ctx.arc(padding / 2 + 2, padding / 2 - 2, circleRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = '#E91E63';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Icons at bottom - INSIDE the padding area (after photo ends)
                    const photoEndY = canvasHeight - padding;
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(8, photoEndY + 8, canvasWidth - 16, padding - 16);
                    ctx.font = `${Math.round(32 * textScale)}px Arial`; // 28→32
                    ctx.textAlign = 'center';
                    ctx.fillText('❤️ 💬 📤', canvasWidth / 2, photoEndY + padding - 6);
                    break;
                    
                case 'macbook':
                    // Username on screen (just above keyboard) - in bottom padding area
                    ctx.font = getFont(32, '-apple-system, BlinkMacSystemFont, sans-serif'); // 28→32
                    ctx.textAlign = 'center';
                    drawTextWithShadow(customization.username, canvasWidth / 2, canvasHeight - 18, 32, '#FFF', '#000');
                    break;
                    
                case 'newspaper':
                    // Headline at top - in top padding area
                    ctx.font = getFont(34, '"Times New Roman", Georgia, serif'); // 28→34
                    ctx.textAlign = 'center';
                    drawTextWithShadow(customization.headline, canvasWidth / 2, 30, 34, '#000', '#FFF');
                    ctx.font = `${Math.round(18 * textScale)}px "Times New Roman", Georgia, serif`; // 16→18
                    drawTextWithShadow(customization.subtitle || customization.date, canvasWidth / 2, 50, 18, '#333', '#FFF');
                    break;
                    
                case 'magazine':
                    // Headline at top - in top padding area
                    ctx.font = getFont(38, 'Impact, Arial, sans-serif'); // 32→38
                    ctx.textAlign = 'center';
                    drawTextWithShadow(customization.headline, canvasWidth / 2, 32, 38, '#EC4899', '#FFF');
                    ctx.font = getFont(18, 'Arial, sans-serif'); // 16→18
                    drawTextWithShadow(customization.subtitle, canvasWidth / 2, 52, 18, '#A855F7', '#FFF');
                    break;
                    
                case 'movie':
                    // Title at top - in top padding area with cinematic style
                    ctx.font = getFont(30, '"Bebas Neue", Impact, Arial, sans-serif'); // 26→30
                    ctx.textAlign = 'center';
                    drawTextWithShadow(customization.headline, canvasWidth / 2, 28, 30, '#FCD34D', '#000');
                    ctx.font = `${Math.round(16 * textScale)}px Arial, sans-serif`; // 14→16
                    drawTextWithShadow(customization.subtitle, canvasWidth / 2, 48, 16, '#FFF', '#000');
                    break;
                    
                case 'passport':
                    // Info at top - in top padding area with official look
                    ctx.font = getFont(24, 'Arial, sans-serif'); // 20→24
                    ctx.textAlign = 'center';
                    drawTextWithShadow(customization.headline, canvasWidth / 2, 26, 24, '#FCD34D', '#000');
                    ctx.font = `${Math.round(16 * textScale)}px Arial, sans-serif`; // 14→16
                    drawTextWithShadow(`${customization.location} - ${customization.date}`, canvasWidth / 2, 46, 16, '#FFF', '#000');
                    break;
                    
                case 'vintage':
                    // Message at top - in top padding area with retro style
                    ctx.font = getFont(28, '"Brush Script MT", cursive, serif'); // 24→28
                    ctx.textAlign = 'center';
                    drawTextWithShadow(customization.message, canvasWidth / 2, 28, 28, '#92400E', '#FEFCE8');
                    ctx.font = `italic ${Math.round(16 * textScale)}px "Times New Roman", Georgia, serif`; // 14→16
                    drawTextWithShadow(customization.date, canvasWidth / 2, 48, 16, '#78350F', '#FEFCE8');
                    break;
                    
                case 'comic':
                    // Message at top - in top padding area with comic style
                    ctx.font = getFont(36, '"Comic Sans MS", "Comic Neue", cursive'); // 32→36
                    ctx.textAlign = 'center';
                    // Comic book outline effect
                    ctx.strokeStyle = '#FFF';
                    ctx.lineWidth = Math.round(6 * textScale);
                    ctx.strokeText(customization.message, canvasWidth / 2, 32);
                    ctx.fillStyle = '#000';
                    ctx.fillText(customization.message, canvasWidth / 2, 32);
                    break;
                    
                case 'scrapbook':
                    // Message at top - in top padding area with handwritten style
                    ctx.font = getFont(30, '"Comic Sans MS", cursive, sans-serif'); // 26→30
                    ctx.textAlign = 'center';
                    drawTextWithShadow(customization.message, canvasWidth / 2, 32, 30, '#EC4899', '#FFF');
                    break;
            }
            
            // Reset context
            ctx.textAlign = 'left';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }
        
        function drawTemplateBranding(ctx, width, height, brandingHeight) {
            const brandingY = height - brandingHeight + 20;
            
            switch(template) {
                case 'instagram':
                    // Use custom username if provided
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 18px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.username, width / 2, brandingY);
                    ctx.font = '10px Arial';
                    ctx.fillStyle = '#666';
                    ctx.fillText('thanhnguyxn.github.io/Photo-Booth', width / 2, brandingY + 25);
                    break;
                case 'macbook':
                    // Use custom username
                    ctx.fillStyle = '#FFF';
                    ctx.font = 'bold 18px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.username, width / 2, brandingY);
                    ctx.fillStyle = '#9CA3AF';
                    ctx.font = '10px Arial';
                    ctx.fillText('thanhnguyxn.github.io/Photo-Booth', width / 2, brandingY + 25);
                    break;
                case 'newspaper':
                    // Use custom headline and date
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 28px "Times New Roman"';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.headline, width / 2, brandingY);
                    ctx.font = '14px "Times New Roman"';
                    ctx.fillText(customization.date, width / 2, brandingY + 25);
                    break;
                case 'magazine':
                    // Use custom headline
                    ctx.fillStyle = '#EC4899';
                    ctx.font = 'bold 32px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.headline, width / 2, brandingY);
                    ctx.fillStyle = '#A855F7';
                    ctx.font = '12px Arial';
                    ctx.fillText(customization.subtitle, width / 2, brandingY + 25);
                    break;
                case 'movie':
                    // Use custom headline
                    ctx.fillStyle = '#FCD34D';
                    ctx.font = 'bold 22px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.headline, width / 2, brandingY);
                    ctx.font = '12px Arial';
                    ctx.fillText(customization.subtitle, width / 2, brandingY + 25);
                    break;
                case 'passport':
                    // Use custom headline, date, location
                    ctx.fillStyle = '#FCD34D';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.headline, width / 2, brandingY);
                    ctx.font = '12px Arial';
                    ctx.fillText(`${customization.location} - ${customization.date}`, width / 2, brandingY + 22);
                    break;
                case 'vintage':
                    // Use custom message and date
                    ctx.fillStyle = '#92400E';
                    ctx.font = 'bold 18px "Times New Roman"';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.message, width / 2, brandingY);
                    ctx.font = '12px "Times New Roman"';
                    ctx.fillText(customization.date, width / 2, brandingY + 22);
                    break;
                case 'comic':
                    // Use custom message
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 28px "Comic Sans MS"';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.message, width / 2, brandingY);
                    ctx.font = '14px "Comic Sans MS"';
                    ctx.fillText('⚡ SnapStrip ⚡', width / 2, brandingY + 28);
                    break;
                case 'scrapbook':
                    // Use custom message
                    ctx.fillStyle = '#EC4899';
                    ctx.font = 'bold 18px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(customization.message, width / 2, brandingY);
                    ctx.font = '10px Arial';
                    ctx.fillText('thanhnguyxn.github.io/Photo-Booth', width / 2, brandingY + 22);
                    break;
                case 'neon':
                    ctx.shadowColor = '#EC4899';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#EC4899';
                    ctx.font = 'bold 28px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚡ SNAPSTRIP ⚡', width / 2, brandingY);
                    ctx.shadowColor = 'transparent';
                    break;
                default:
                    ctx.fillStyle = '#4B5563';
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('SnapStrip Studio', width / 2, brandingY);
                    ctx.fillStyle = '#9CA3AF';
                    ctx.font = '16px Arial';
                    ctx.fillText('thanhnguyxn.github.io/Photo-Booth', width / 2, brandingY + 30);
            }
        }
        
        // Share functionality
        async function sharePhotoStrip() {
            if (navigator.share) {
                // Create a blob from the first photo (or we could create the strip)
                const response = await fetch(capturedPhotos[0]);
                const blob = await response.blob();
                const file = new File([blob], 'snapstrip.jpg', { type: 'image/jpeg' });
                
                try {
                    await navigator.share({
                        title: 'My SnapStrip Studio Photo Strip',
                        text: 'Check out my photo strip from SnapStrip Studio!',
                        files: [file]
                    });
                } catch (error) {
                    console.log('Share cancelled or failed:', error);
                }
            } else {
                alert('Sharing is not supported on this device. Please download the photo strip instead.');
            }
        }
        
        // Retake all photos
        function retakeAll() {
            if (confirm('Are you sure you want to retake all photos?')) {
                capturedPhotos = [];
                manualPhotoIndex = 0;
                initializePlaceholders();
                photoCount.textContent = `Photo 0/${poses}`;
                downloadBtn.classList.add('hidden');
                retakeBtn.classList.add('hidden');
                manualCaptureBtn.classList.add('hidden');
                continueBtn.classList.add('hidden');
                startBtn.classList.remove('hidden');
                currentPhotoNum.textContent = '1';
            }
        }
        
        // Event listeners
        startBtn.addEventListener('click', startPhotoSession);
        retakeBtn.addEventListener('click', retakeAll);
        continueBtn.addEventListener('click', () => {
            console.log('✅ Continue button clicked!');
            navigateToPreview();
        });
        
        // Edit button - go to edit page with canvas data
        editBtn.addEventListener('click', () => {
            // Save final canvas to localStorage
            const finalCanvas = document.createElement('canvas');
            const finalCtx = finalCanvas.getContext('2d');
            finalCanvas.width = templateCanvas.width;
            finalCanvas.height = templateCanvas.height;
            finalCtx.drawImage(templateCanvas, 0, 0);
            
            localStorage.setItem('finalCanvas', finalCanvas.toDataURL('image/png'));
            window.location.href = `edit.html?layout=${layout}&poses=${poses}&template=${template}`;
        });
        
        downloadBtn.addEventListener('click', downloadPhotoStrip);
        
        // Initialize (don't auto-init camera anymore, wait for source selection)
        initializePlaceholders();
        
        // Only init camera if source mode is already set (e.g., coming back from a refresh)
        // Otherwise, wait for user to choose camera or upload
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Continue Button</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-100">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Test Continue Button</h1>
        
        <div class="space-y-4">
            <button id="test-btn" class="w-full bg-blue-500 text-white py-3 px-6 rounded-lg">
                Test Button Click
            </button>
            
            <button id="continue-btn" class="hidden w-full bg-gradient-to-r from-purple-500 to-pink-600 text-white font-bold py-4 px-12 rounded-full text-xl shadow-2xl hover:shadow-3xl transform hover:scale-105 transition animate-pulse">
                <span>✨ Continue to Preview & Edit</span>
            </button>
            
            <button id="show-btn" class="w-full bg-green-500 text-white py-3 px-6 rounded-lg">
                Show Continue Button
            </button>
        </div>
        
        <div id="log" class="mt-4 p-4 bg-gray-100 rounded text-sm font-mono"></div>
    </div>

    <script>
        const log = document.getElementById('log');
        const continueBtn = document.getElementById('continue-btn');
        const testBtn = document.getElementById('test-btn');
        const showBtn = document.getElementById('show-btn');
        
        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `[${time}] ${message}<br>`;
            console.log(message);
        }
        
        addLog('✅ Page loaded');
        addLog(`continueBtn element: ${continueBtn ? 'Found' : 'NOT FOUND'}`);
        
        testBtn.addEventListener('click', () => {
            addLog('Test button clicked!');
        });
        
        showBtn.addEventListener('click', () => {
            addLog('Showing continue button...');
            continueBtn.classList.remove('hidden');
            addLog('Continue button should be visible now');
        });
        
        continueBtn.addEventListener('click', () => {
            addLog('✅ Continue button clicked!');
            alert('Continue button works!');
            
            // Simulate navigation
            const layout = 'A';
            const poses = 4;
            const template = 'classic';
            const url = `preview.html?layout=${layout}&poses=${poses}&template=${template}`;
            addLog(`Would navigate to: ${url}`);
        });
        
        addLog('All event listeners attached');
    </script>
</body>
</html>

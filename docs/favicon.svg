<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Snapbooth">
  <style>
    .ring {
      stroke: #0a0b10;
    }
    @media (prefers-color-scheme: dark) {
      .ring {
        stroke: #ffffff;
      }
    }
  </style>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" class="ring" stroke-width="6"/>
  <!-- Center glowing aperture dot -->
  <circle cx="32" cy="32" r="10" fill="#FF4D29"/>
  <!-- Tiny lens flare -->
  <circle cx="37" cy="27" r="3.5" fill="#FFFFFF" opacity="0.9"/>
</svg>
